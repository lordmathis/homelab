services:
  agentkit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentkit
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "9002:8000"
    volumes:
      - ./plugins:/app/plugins
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
      - ./logs:/app/logs
