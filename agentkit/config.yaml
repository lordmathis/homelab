mcps:
  gitea:
    command: gitea-mcp
    type: "stdio"
    args:
      - "-t"
      - "stdio"
    env:
      GITEA_HOST: "${GITEA_HOST}"
      GITEA_ACCESS_TOKEN: "${GITEA_ACCESS_TOKEN}"
  openweathermap:
    command: "npx"
    type: "stdio"
    args:
      - "@tristau/openweathermap-mcp"
      - "--apikey"
      - ${OPENWEATHERMAP_API_KEY}

plugins:
  agents_dir: "/app/plugins/agents"
  tools_dir: "/app/plugins/tools"
  skills_dir: "/app/plugins/skills"

providers:
  llamactl:
    api_base: "${LLAMACTL_API_BASE_URL}"
    api_key: "${LLAMACTL_API_KEY}"
  openrouter:
    api_base: "https://openrouter.ai/api/v1"
    api_key: "${OPENROUTER_API_KEY}"
    model_filter:
      conditions:
        - field: "id"
          contains: ":free"
  google:
    api_base: "https://generativelanguage.googleapis.com/v1beta/openai/"
    api_key: "${GEMINI_API_KEY}"

logging:
  target: "/app/logs/agentkit.log"

transcription:
  base_url: "http://host.docker.internal:9100"

connectors:
  github:
    type: "github"
    token: "${GITHUB_TOKEN}"
  forgejo:
    type: "forgejo"
    base_url: "${GITEA_HOST}/api/v1"
    token: "${GITEA_ACCESS_TOKEN}"

history_db_path: "/app/data/agentkit.db"