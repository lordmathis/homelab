server:
  host: ""
  port: 9002

mcps:
  gitea:
    command: gitea-mcp
    type: "stdio"
    args:
      - "-t"
      - "stdio"
    env:
      GITEA_HOST: "${GITEA_HOST}"
      GITEA_ACCESS_TOKEN: "${GITEA_ACCESS_TOKEN}"

plugins:
  agents_dir: "./plugins/agents"
  tools_dir: "./plugins/tools"
  skills_dir: "./plugins/skills"

providers:
  llamactl:
    api_base: "${LLAMACTL_API_BASE_URL}"
    api_key: "${LLAMACTL_API_KEY}"
  openrouter:
    api_base: "https://openrouter.ai/api/v1"
    api_key: "${OPENROUTER_API_KEY}"
    model_filter:
      conditions:
        - field: "id"
          contains: ":free"
  google:
    api_base: "https://generativelanguage.googleapis.com/v1beta/openai/"
    api_key: "${GEMINI_API_KEY}"
  anthropic:
    api_base: "https://api.anthropic.com/v1"
    api_key: "${ANTHROPIC_API_KEY}"
    model_ids:
      - "claude-sonnet-4-6"
      - "claude-haiku-4-5"
    type: "anthropic"
  z-ai:
    api_base: "https://api.z.ai/api/coding/paas/v4"
    api_key: "${ZAI_API_KEY}"

logging:
  target: "stdout"

transcription:
  base_url: "http://localhost:9100"

connectors:
  github:
    type: "github"
    token: "${GITHUB_TOKEN}"
  forgejo:
    type: "forgejo"
    base_url: "${GITEA_HOST}/api/v1"
    token: "${GITEA_ACCESS_TOKEN}"

history_db_path: "./data/agentkit.db"